# Daily-brief layout on reTerminal E1003.
# Pulls strings from sensor.eink_* entities published by our Python server.

substitutions:
  device_name: reterminal-e1003
  friendly_name: reTerminal E1003

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  includes:
    - reterminal_helpers.h
  on_boot:
    priority: 300
    then:
      - delay: 2s
      - script.execute: manage_run_and_sleep

deep_sleep:
  id: deep_sleep_ctl
  esp32_ext1_wakeup:
    pins:
      - number: GPIO3
        allow_other_uses: true
      - number: GPIO4
        allow_other_uses: true
      - number: GPIO5
        allow_other_uses: true
    mode: ANY_LOW

switch:
  # HA-exposed switch. Flip ON before OTA flashing so the device skips its
  # post-draw sleep and stays reachable. Flip OFF when done.
  - platform: template
    name: "Stay Awake"
    id: stay_awake
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

psram:
  mode: octal

external_components:
  - source:
      type: git
      url: https://github.com/koosoli/Seeed-10.3-inch-IT8951-ESPHome-Drivers
      ref: b6de94aedaea55433db2458b5e5b15f4f7f20b1a
    components: [it8951_reterminal_e1003]

# Pin assignments are board-fixed for the reTerminal E1003.
i2c:
  - sda: GPIO19
    scl: GPIO20
    scan: true
    id: bus_a

spi:
  - id: it8951_spi
    clk_pin: GPIO7
    mosi_pin: GPIO9
    miso_pin: GPIO8

touchscreen:
  - platform: gt911
    id: touchscreen_panel
    interrupt_pin: GPIO2

script:
  # Restart-mode debounce: every entity arrival resets the timer, so a burst of
  # state pushes from HA collapses into a single redraw at the end of the burst.
  - id: debounced_redraw
    mode: restart
    then:
      - delay: 2s
      - component.update: epaper_display

  # Top-level wake handler: wait for HA + time sync, pick the right page based
  # on time-of-day, redraw, hold awake briefly, then go back to deep sleep
  # (unless Stay Awake is on — that's the OTA bypass).
  - id: manage_run_and_sleep
    mode: restart
    then:
      - logger.log: "Waking — waiting for HA + time sync"
      - wait_until:
          condition:
            lambda: 'return id(ha_time).now().is_valid() && api_is_connected();'
          timeout: 120s
      # Let HA push initial subscribed-state values for our text_sensors.
      - delay: 5s
      - lambda: |-
          int h = id(ha_time).now().hour;
          if (h >= 7 && h < 21) {
            id(epaper_display).show_page(id(page_weather));
          } else {
            id(epaper_display).show_page(id(page_quote));
          }
      - component.update: epaper_display
      - lambda: |-
          // Publish last-redraw timestamp in ISO 8601 UTC. now().timestamp is
          // the unix epoch in UTC; convert back to a UTC ESPTime for formatting.
          auto utc = esphome::ESPTime::from_epoch_utc(id(ha_time).now().timestamp);
          char buf[32];
          snprintf(buf, sizeof(buf),
                   "%04d-%02d-%02dT%02d:%02d:%02dZ",
                   utc.year, utc.month, utc.day_of_month,
                   utc.hour, utc.minute, utc.second);
          id(last_redraw).publish_state(buf);
      # Hold awake long enough to push OTA / interact with buttons.
      - delay: 30s
      # If Stay Awake is on, hold here until the user turns it off.
      - if:
          condition:
            switch.is_on: stay_awake
          then:
            - logger.log: "Stay Awake ON — holding until OFF"
            - wait_until:
                switch.is_off: stay_awake
            - logger.log: "Stay Awake OFF — going to sleep"
      - lambda: |-
          auto t = id(ha_time).now();
          int h = t.hour;
          int m = t.minute;
          int s = t.second;
          uint32_t secs;
          if (h >= 22) {
            // 22:00-23:59 → sleep until 07:00 tomorrow
            secs = ((24 - h) * 3600 + 7 * 3600) - (m * 60 + s);
          } else if (h < 7) {
            // 00:00-06:59 → sleep until 07:00 today
            secs = ((7 - h) * 3600) - (m * 60 + s);
          } else {
            // Daytime: 30 min
            secs = 30 * 60;
          }
          ESP_LOGI("sleep", "Sleeping for %u seconds", secs);
          id(deep_sleep_ctl).set_sleep_duration(secs * 1000);
      - deep_sleep.enter:
          id: deep_sleep_ctl

font:
  # All fonts use bpp:4 for grayscale antialiasing. Pair with passing the
  # actual background color to it.print so edges blend correctly.
  - file: "gfonts://Roboto"
    id: font_small
    size: 26
    bpp: 4
    glyphs: &glyphs "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.,:;-!?'\"()/+ °—–"
  - file: "gfonts://Roboto@700"
    id: font_small_bold
    size: 26
    bpp: 4
    glyphs: *glyphs
  - file: "gfonts://Roboto"
    id: font_small_mini
    size: 20
    bpp: 4
    glyphs: *glyphs
  - file: "gfonts://Roboto"
    id: font_med
    size: 38
    bpp: 4
    glyphs: *glyphs
  - file: "gfonts://Roboto@700"
    id: font_med_bold_small
    size: 38
    bpp: 4
    glyphs: *glyphs
  - file: "gfonts://Roboto@700"
    id: font_med_bold
    size: 64
    bpp: 4
    glyphs: *glyphs
  - file: "gfonts://Roboto"
    id: font_med_regular_large
    size: 64
    bpp: 4
    glyphs: *glyphs
  - file: "gfonts://Roboto@700"
    id: font_header
    size: 56
    bpp: 4
    glyphs: *glyphs
  - file: "gfonts://Merriweather@700"
    id: font_quote
    size: 72
    bpp: 4
    glyphs: *glyphs
  - file: "gfonts://Oswald@300"
    id: font_label
    size: 27
    bpp: 4
    glyphs: "CDEHLOTW"
  - file: "gfonts://Oswald@300"
    id: font_label_xs
    size: 17
    bpp: 4
    glyphs: "CDEHLOTW"
  - file: "gfonts://Merriweather@700"
    id: font_quote_small
    size: 52
    bpp: 4
    glyphs: *glyphs
  - file: "gfonts://Merriweather"
    id: font_author
    size: 38
    bpp: 4
    glyphs: *glyphs
  # Emoji icon font, monochrome (Noto Emoji is the line-drawn variant).
  # bpp: 4 gives 16-level grayscale antialiasing — looks much smoother on
  # the 226-DPI panel than the default 1-bit rendering.
  - file: "gfonts://Noto Emoji"
    id: font_icon
    size: 144
    bpp: 4
    glyphs: "☀🌤⛅☁🌫🌦🌧🌨❄⛈"
  # Dog icon for the today (full) walk timeline.
  - file: "gfonts://Noto Emoji"
    id: font_dog_today
    size: 58
    bpp: 4
    glyphs: "🦮"
  - file: "gfonts://Noto Emoji"
    id: font_icon_xs
    size: 22
    bpp: 4
    glyphs: "🌧🌡❄☀"
  # Row-label icons (rain/temp) for the today timeline; bigger than mini cells.
  - file: "gfonts://Noto Emoji"
    id: font_icon_row
    size: 32
    bpp: 4
    glyphs: "🌧🌡"
  # Dog icon for the mini (tomorrow/day3) walk timelines.
  - file: "gfonts://Noto Emoji"
    id: font_dog_mini
    size: 44
    bpp: 4
    glyphs: "🦮"


# Subscribe to entities our Python server publishes via HA REST API.
# String values use text_sensor; numeric values use sensor.
